# Source: meshcore-dev/flasher.meshcore.io config.json
name: ProMicro nrf52 (faketec)
vendorId: promicro
kind: dev-board
lifecycle: active
familyId: promicro-nrf52
aliases:
  - ProMicro nRF52
image: faketec.svg
official: true
description: >-
  DIY ProMicro nRF52840 MeshCore target with an external SX1262 LoRa module.
  The upstream firmware profile exposes OLED, GNSS and sensor hooks for
  community builds, but the exact module and enclosure depend on the builder.
roles:
  - companion
  - repeater
  - room-server
price:
  # Source: community parts cost estimate for ProMicro nRF52 + HT-RA62 builds
  amount: 13
  currency: USD
  asOf: 2026-06
transports:
  - ble
  - usb
hardware:
  mcu:
    model: nrf52840
    flashMb: 1
    # Inferred from the ProMicro nRF52 family
    ramKb: 256
  radios:
    - technology: lora
      chip: sx1262
      txPowerDbm: 22
  display:
    status: none
  leds:
    status: unknown
  gnss:
    status: none
  power:
    batterySupported: false
    batteryBuiltIn: false
    charging: false
    solarInput: false
interfaces:
  usb:
    connector: unknown
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: unknown
    ble: true
  wifi:
    status: none
