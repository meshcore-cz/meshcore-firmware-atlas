# Source: https://lilygo.cc/en-us/products/t-watch-s3
# Source: https://wiki.lilygo.cc/get_started/en/Meshtastic/Meshtastic_lilygo.html
name: LilyGo T-Watch S3
vendorId: lilygo
kind: product
lifecycle: active
familyId: lilygo-t-watch-s3
aliases:
  - T-Watch S3
official: true
product_url: https://lilygo.cc/en-us/products/t-watch-s3
roles:
  - companion
  - repeater
  - room-server
  - standalone-ui
transports:
  - ble
  - usb
  - wifi
hardware:
  mcu:
    model: esp32-s3
    flashMb: 16
    psramMb: 8
  radios:
    - technology: lora
      chip: sx1262
      frequencyVariants:
        - '433'
        - '868'
        - '915'
        - '920'
  display:
    status: present
    technology: display
  gnss:
    status: none
  power:
    batterySupported: true
    charging: true
    solarInput: false
interfaces:
  usb:
    connector: USB-C
    capabilities:
      - power
      - serial
      - flashing
  bluetooth:
    version: '5.0'
    ble: true
  wifi:
    status: present
    standard: 802.11 b/g/n
