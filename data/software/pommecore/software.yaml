name: PommeCore
kind: client
status: active
maturity: beta
description: >-
  Native SwiftUI companion app for MeshCore LoRa mesh radio devices running on
  iPhone, iPad, Mac, and Apple Watch, with messaging, mesh map, RF tools,
  line-of-sight analysis, remote administration, and OTA firmware updates.
