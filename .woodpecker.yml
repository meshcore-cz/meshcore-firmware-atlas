steps:
  - name: build
    image: node:24
    environment:
      SITE_ORIGIN: https://dev.meshcore.ninja
      VITE_SITE_ORIGIN: https://dev.meshcore.ninja
      VITE_VERSION_SUFFIX: -dev
      VITE_API_BASE: https://api.meshcore.ninja
    commands:
      - npm ci
      - npm test
      - npm run build

  - name: deploy
    image: rclone/rclone:latest
    when:
      - event: push
        branch: dev
    depends_on: [build]
    environment:
      DEPLOY_PASSWORD:
        from_secret: DEPLOY_SECRET
    commands:
      - |
        test -n "$DEPLOY_PASSWORD" || {
          echo "DEPLOY_PASSWORD is missing"
          exit 1
        }

        RCLONE_PASSWORD="$(printf '%s' "$DEPLOY_PASSWORD" | rclone obscure -)"

        rclone sync build/ \
          ":sftp,host=sftpgo.pp0.co,port=2222,user=meshcore-ninja,pass=${RCLONE_PASSWORD},shell_type=none:/public/meshcore-ninja/" \
          -v